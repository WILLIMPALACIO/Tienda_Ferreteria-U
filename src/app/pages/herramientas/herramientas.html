<section class="productos-container">
  <!-- Banner promocional -->
  <div class="promo-banner bg-warning text-dark py-3 border-top border-bottom shadow-sm">
    <div
      class="container d-flex flex-column flex-md-row justify-content-between align-items-center"
    >
      <!-- Texto principal -->
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-tools fs-2 text-dark"></i>
        <div>
          <h5 class="mb-0 fw-bold text-uppercase">¡Construye tu hogar con calidad!</h5>
          <p class="mb-0 small">
            Encuentra todo lo que necesitas en un solo lugar: herramientas, pinturas, materiales y
            más.
          </p>
        </div>
      </div>

      <!-- Botón de acción -->
      <a
        href="#productos"
        class="btn btn-dark mt-3 mt-md-0 fw-bold d-flex align-items-center gap-2"
      >
        <span>Ver productos</span>
        <i class="bi bi-arrow-right-circle"></i>
      </a>
    </div>
  </div>

  <div class="cards">
    @for (item of productos; track $index) {
    <div class="card" (click)="navigation(item.id)">
      <img [src]="item.imagen" />
      <h3>{{ item.nombre }}</h3>
      <p class="precio">${{ item.precio }}</p>
      <button>Agregar al carrito</button>
    </div>
    }
  </div>
</section>
